<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #f0f0f4;
      --muted: #7a7a8c;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px var(--accent-glow);
    }

    .wave {
      font-size: 3.5rem;
      display: inline-block;
      animation: wave 2.4s ease-in-out infinite;
      transform-origin: 70% 80%;
    }

    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10%, 30%      { transform: rotate(20deg); }
      20%           { transform: rotate(-8deg); }
      40%           { transform: rotate(14deg); }
      50%           { transform: rotate(-4deg); }
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-top: 1.25rem;
      line-height: 1.1;
    }

    h1 span {
      background: linear-gradient(135deg, #a78bfa, #7c6af7, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: var(--muted);
      margin-top: 0.875rem;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(124, 106, 247, 0.12);
      border: 1px solid rgba(124, 106, 247, 0.3);
      color: #a78bfa;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7c6af7;
      box-shadow: 0 0 6px #7c6af7;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wave">👋</div>
    <h1>Hello, <span>World</span></h1>
    <p>Your app is live and ready.<br>Start building something great.</p>
    <hr class="divider" />
    <span class="badge">Built with Burrow</span>
  </div>
</body>
</html>
